name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project "Lilla jag 3.xcodeproj" \
            -scheme "Lilla jag 3" \
            -destination "platform=iOS Simulator,name=iPhone 16" \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Test
        run: |
          set -o pipefail
          xcodebuild test \
            -project "Lilla jag 3.xcodeproj" \
            -scheme "Lilla jag 3" \
            -destination "platform=iOS Simulator,name=iPhone 16" \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty
        continue-on-error: true
